name: "📝 衛教單張請領單"
description: "各單位請領衛教單張專用網頁表單"
title: "[請領] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ### 📖 找不到單張名稱或編號嗎？
        👉 **[點擊這裡開啟「衛教單張總目錄」對照表](https://docs.google.com/spreadsheets/d/e/2PACX-1vQSUa7J_iBeb3iqdAebhPcD4EmCmMCXWt1hcdTxKjGLs661QLHdjADhBbffiF-Wabip-8JB1Pa2_KqF/pubhtml?gid=1011173847&single=true)** *(建議點擊右鍵「在新分頁開啟」，看著編號填寫最不容易出錯喔！單次最高可請領 10 種)*
        ---
  - type: input
    id: unit
    attributes:
      label: "🏥 申請單位"
      placeholder: "例如：5A病房、急診..."
    validations:
      required: true
  - type: input
    id: applicant_info
    attributes:
      label: "👤 請領人姓名與分機"
      placeholder: "例如：王小明 / 分機 1234"
    validations:
      required: true
  - type: input
    id: item_1
    attributes:
      label: "單張編號或名稱 (1)"
      placeholder: "例如：A001 或 戒菸指南"
    validations:
      required: true
  - type: dropdown
    id: qty_1
    attributes:
      label: "數量 (1)"
      options:
        - "30張"
        - "60張"
    validations:
      required: true
  - type: input
    id: item_2
    attributes:
      label: "單張編號或名稱 (2)"
      placeholder: "若無可留白"
  - type: dropdown
    id: qty_2
    attributes:
      label: "數量 (2)"
      options:
        - "無"
        - "30張"
        - "60張"
